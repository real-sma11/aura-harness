[package]
name = "aura-fleet-spawn"
description = "Fleet-layer subagent spawn mechanics + per-parent audit-append lease (Phase 7a)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
aura-core-types = { path = "../aura-core-types" }
aura-core-modes = { path = "../aura-core-modes" }
aura-core-permissions = { path = "../aura-core-permissions" }
aura-agent-subagent = { path = "../aura-agent-subagent" }
aura-agent-kernel = { path = "../aura-agent-kernel" }
# Phase 6a anticipated this edge: the fleet layer binds to the
# layered `aura-agent-loop` crate name purely for the `AgentLoopEvent`
# type threaded onto the optional child event stream (no agent-loop
# logic is invoked here).
aura-agent-loop = { path = "../aura-agent-loop" }
aura-store-db = { path = "../aura-store-db" }
aura-store-record = { path = "../aura-store-record" }
aura-fleet-registry = { path = "../aura-fleet-registry" }
aura-fleet-quota = { path = "../aura-fleet-quota" }
aura-plugin-hooks = { path = "../aura-plugin-hooks" }
async-trait = { workspace = true }
bytes = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
parking_lot = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["sync", "time", "rt", "macros"] }
tokio-util = { workspace = true }
futures-util = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
aura-store-db = { path = "../aura-store-db" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time", "sync"] }

# Phase 9: `aura-store-record` is consumed through the
# `aura-store` compatibility shell; the explicit dep stays for
# audit-record schema discoverability.
[package.metadata.cargo-machete]
ignored = ["aura-store-record"]

[lints]
workspace = true
