[package]
name = "aura-tools"
description = "Tool executor and registry for filesystem and command operations"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
aura-core-types = { path = "../aura-core-types" }
aura-exec-traits = { path = "../aura-exec-traits" }
# Phase B / Commit 3 / Step 6: the `permissions` module moved here
# from `aura-runtime/src/tool_permissions.rs` reads `Identity`
# records off the per-agent log to recover the in-effect tool
# permissions surface. The dep is store-layer (downward) so it
# does not perturb the layer-boundary topology.
aura-store-db = { path = "../aura-store-db" }
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
base64 = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
async-trait = { workspace = true }
glob = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["stream"] }
similar = "2"
toml = { workspace = true }
walkdir = { workspace = true }
which = { workspace = true }
futures-util = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
