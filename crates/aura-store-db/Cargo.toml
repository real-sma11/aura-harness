[package]
name = "aura-store-db"
description = "RocksDB-backed durable storage implementation for Aura (Phase 2: extracted from aura-store)"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[dependencies]
aura-core-types = { path = "../aura-core-types" }
aura-store-record = { path = "../aura-store-record" }
rocksdb = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
static_assertions = "1.1"
# Sealed state-at-rest (Swarm TEE phase 5): AES-256-GCM value sealing
# under the per-agent DEK released by the KBS after attestation.
aes-gcm = { workspace = true }
zeroize = { workspace = true }
# Secret metadata timestamps (Swarm TEE phase 6 vault).
chrono = { workspace = true }
serde = { workspace = true }
# Processes / automations (Swarm TEE phase 7): cron-expression
# validation + next_run_at computation, UUID process/run ids.
cron = { workspace = true }
uuid = { workspace = true }

[features]
# Expose fault-injection helpers for the Wave 7 invariant-atomicity
# test suite (`tests/invariant_atomicity.rs`). The helpers are never
# compiled in release builds unless this feature is explicitly enabled.
test-support = []

[dev-dependencies]
tempfile = { workspace = true }
tokio = { workspace = true }
proptest = { workspace = true }
futures-util = { workspace = true }

# The Wave 7 atomicity test needs the `test-support` fault-injection
# helpers. Gate the integration test on that feature so plain
# `cargo test -p aura-store-db` (without --all-features) still compiles,
# while `cargo test --workspace --all-features` picks it up.
[[test]]
name = "invariant_atomicity"
required-features = ["test-support"]

[lints]
workspace = true
