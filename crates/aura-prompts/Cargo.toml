[package]
name = "aura-prompts"
description = "Phase 3 compatibility shell over aura-context-prompts"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

# IMPORTANT — boundary contract: the underlying `aura-context-prompts`
# crate is render-only and must NOT depend on `aura-agent`,
# `aura-automaton`, `aura-runtime`, or `aura-reasoner` /
# `aura-model-reasoner`. This shell inherits that contract by only
# re-exporting through `aura-context-prompts`.
[dependencies]
aura-context-prompts = { path = "../aura-context-prompts" }

[lints]
workspace = true
