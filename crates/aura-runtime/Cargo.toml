[package]
name = "aura-runtime"
description = "Runtime crate for Aura - router, scheduler, workers"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "aura-node"
path = "src/main.rs"

[features]
default = []
test-support = []

[dependencies]
aura-core = { path = "../aura-core" }
aura-core-modes = { path = "../aura-core-modes" }
aura-core-permissions = { path = "../aura-core-permissions" }
aura-protocol = { path = "../aura-protocol" }
aura-store = { path = "../aura-store" }
aura-tools = { path = "../aura-tools" }
aura-compaction = { path = "../aura-compaction" }
aura-reasoner = { path = "../aura-reasoner" }
aura-kernel = { path = "../aura-kernel" }
aura-agent = { path = "../aura-agent" }
aura-agent-subagent = { path = "../aura-agent-subagent" }
aura-prompts = { path = "../aura-prompts" }
aura-memory = { path = "../aura-memory" }
aura-automaton = { path = "../aura-automaton" }
aura-skills = { path = "../aura-skills" }
# Phase 7a: route the task tool through the fleet layer.
aura-fleet-spawn = { path = "../aura-fleet-spawn" }
aura-fleet-registry = { path = "../aura-fleet-registry" }
aura-fleet-quota = { path = "../aura-fleet-quota" }
aura-fleet-daemon = { path = "../aura-fleet-daemon" }
aura-config = { path = "../aura-config" }
aura-context-skills = { path = "../aura-context-skills" }
aura-plugin-core = { path = "../aura-plugin-core" }
aura-plugin-hooks = { path = "../aura-plugin-hooks" }
chrono = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
axum = { workspace = true }
reqwest = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tower_governor = { workspace = true }
governor = { workspace = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
blake3 = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
uuid = { workspace = true }
futures-util = { workspace = true }
dotenvy = { workspace = true }
portable-pty = { workspace = true }
which = { workspace = true }
dirs = { workspace = true }
colored = { workspace = true }
terminal_size = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
insta = { workspace = true }

# Phase 9: `aura-context-skills` and `aura-fleet-daemon` are held
# as direct deps so the runtime can reach into the
# Phase 8 plugin-skills wiring and the Phase 7a fleet daemon
# without an extra migration touch. The lib.rs `pub use`s do not
# always name them today (the surface migration is incremental).
[package.metadata.cargo-machete]
ignored = ["aura-context-skills", "aura-fleet-daemon"]

[lints]
workspace = true
