[package]
name = "aura-runtime"
description = "HTTP/WS gateway crate for Aura — composes aura-engine + aura-domain-http into the aura-node binary"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[[bin]]
name = "aura-node"
path = "src/main.rs"

[features]
default = []
test-support = []

[dependencies]
aura-core-types = { path = "../aura-core-types" }
aura-protocol = { path = "../aura-protocol" }
aura-store-db = { path = "../aura-store-db" }
aura-tools = { path = "../aura-tools" }
aura-model-reasoner = { path = "../aura-model-reasoner" }
aura-agent-kernel = { path = "../aura-agent-kernel" }
aura-agent = { path = "../aura-agent" }
aura-agent-subagent = { path = "../aura-agent-subagent" }
aura-context-memory = { path = "../aura-context-memory" }
aura-automaton = { path = "../aura-automaton" }
aura-surface-automaton = { path = "../aura-surface-automaton" }
# Phase B / Commit 3: the chat-session bootstrap renders a typed
# `<agent_identity>` block via `aura_context_prompts::SystemPromptBuilder`
# and the session state derives the compaction tier via
# `aura_compaction`. The engine extraction kept these gateway-side
# imports in `session/state.rs`, so the deps stay direct.
aura-context-prompts = { path = "../aura-context-prompts" }
aura-context-compaction = { path = "../aura-context-compaction" }
# Phase B / Commit 3 engine extraction. The composition root in
# `node.rs` instantiates the engine (scheduler + automaton bridge +
# child runner) and hands it to the gateway router.
aura-engine = { path = "../aura-engine" }
# Phase C / Commit 4: HTTP `DomainApi` impl moved out of the gateway.
# `node.rs` constructs `HttpDomainApi` from here.
aura-domain-http = { path = "../aura-domain-http" }
# Phase C / Commit 4: PTY WebSocket handler moved out of the gateway.
# The `/ws/terminal` upgrade handler is a thin delegate over
# `aura_terminal::ws::handle_terminal_ws`.
aura-terminal = { path = "../aura-terminal" }
# Phase B / Commit 3 / Step 3a: the fleet-layer task dispatcher impl.
# Wired into the engine's `RuntimeChildRunner` at composition time.
aura-fleet-subagent = { path = "../aura-fleet-subagent" }
# Phase 7a: route the task tool through the fleet layer. Phase B
# keeps these deps because `node.rs` still hand-assembles the
# fleet spawner inputs (registry, quota, leases, orphans) and
# passes them to `FleetSubagentDispatcher::with_components`.
aura-fleet-spawn = { path = "../aura-fleet-spawn" }
aura-fleet-registry = { path = "../aura-fleet-registry" }
aura-fleet-quota = { path = "../aura-fleet-quota" }
aura-fleet-daemon = { path = "../aura-fleet-daemon" }
aura-config = { path = "../aura-config" }
aura-context-skills = { path = "../aura-context-skills" }
aura-plugin-core = { path = "../aura-plugin-core" }
aura-plugin-hooks = { path = "../aura-plugin-hooks" }
chrono = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio = { workspace = true }
tokio-util = { workspace = true }
axum = { workspace = true }
# Phase C / Commit 4 note: the HTTP `DomainApi` impl moved to
# `aura-domain-http` (which now owns the domain-call `reqwest`
# surface the gateway used to import directly). `reqwest` stays as
# a direct dep here for the runtime-owned outbound HTTP exceptions:
# `gateway/session/generation.rs` proxies router SSE generation
# streams, and `gateway/session/cross_agent_hook.rs` issues the
# Aura-OS cross-agent callback.
reqwest = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tower_governor = { workspace = true }
governor = { workspace = true }
dashmap = { workspace = true }
blake3 = { workspace = true }
async-trait = { workspace = true }
base64 = { workspace = true }
uuid = { workspace = true }
futures-util = { workspace = true }
dotenvy = { workspace = true }
dirs = { workspace = true }
colored = { workspace = true }
terminal_size = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
insta = { workspace = true }
# `test-util` enables tokio's paused-clock test helpers
# (`#[tokio::test(start_paused = true)]`) used by the chat tool-approval
# auto-deny-timeout test, without affecting the production build.
tokio = { workspace = true, features = ["test-util"] }

# Phase 9: `aura-context-skills`, `aura-automaton`, and
# `aura-fleet-daemon` are held
# as direct deps so the runtime can reach into the
# Phase 8 plugin-skills wiring and the Phase 7a fleet daemon
# without an extra migration touch. The lib.rs `pub use`s do not
# always name them today (the surface migration is incremental).
[package.metadata.cargo-machete]
ignored = ["aura-automaton", "aura-context-skills", "aura-fleet-daemon"]

[lints]
workspace = true
