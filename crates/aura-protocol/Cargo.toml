[package]
name = "aura-protocol"
description = "Shared wire protocol types for the Aura harness WebSocket API"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
blake3 = { workspace = true }
ts-rs = { version = "10", optional = true, features = ["serde-json-impl"] }
# Phase A: aura-protocol owns the wire↔core seam, so the conversion
# helpers (`installed_tool_to_core`, `agent_tool_permissions_from_wire`,
# etc.) that used to live in `aura-runtime::protocol` need access to
# the harness-core type definitions they decode into. Both crates sit
# in the `core` layer, so this is a same-layer (sibling) dependency.
aura-core = { path = "../aura-core" }

[features]
typescript = ["ts-rs"]

[lints]
workspace = true
