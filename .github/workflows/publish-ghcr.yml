name: Publish GHCR image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/cypher-asi/aura-harness

jobs:
  publish:
    name: Build and publish aura-harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute Docker tags
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          {
            echo "tags<<EOF"
            echo "${IMAGE_NAME}:sha-${short_sha}"
            if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
              echo "${IMAGE_NAME}:latest"
              echo "${IMAGE_NAME}:main"
            elif [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
              echo "${IMAGE_NAME}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.render
          platforms: linux/amd64
          push: true
          build-args: |
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy main image to Render
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_HARNESS_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_HARNESS_DEPLOY_HOOK_URL is not configured"
            exit 1
          fi
          curl --fail --show-error --silent \
            --retry 3 --retry-all-errors \
            --request POST "$RENDER_DEPLOY_HOOK_URL"
