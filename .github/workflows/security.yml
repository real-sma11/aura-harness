name: security

# Dedicated supply-chain workflow (Phase 8). Runs on every push to main,
# every PR, and on a weekly schedule so long-lived branches still get
# scanned as new RustSec advisories land. Overlaps intentionally with the
# `deny` / `audit` jobs in ci.yml — those gate PRs with the locally
# pinned cargo-deny version, while this workflow exercises the upstream
# cargo-deny-action + rustsec/audit-check setup so we notice drift.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 06:00 UTC — off the normal weekday push cadence so scheduled
    # failures aren't drowned out by regular CI noise.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # cargo-deny: license + advisory + ban + source policy
  # ---------------------------------------------------------------------------
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # ---------------------------------------------------------------------------
  # cargo-audit: RustSec advisory scan (complementary to cargo-deny advisories)
  # ---------------------------------------------------------------------------
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    # rustsec/audit-check creates check runs and opens issues for new
    # advisories, so this job needs more than the read-only default.
    permissions:
      contents: read
      checks: write
      issues: write
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      # Pinned to the Node 24 commit on master: no release tag past v2.0.0
      # (which still runs on Node 20) has been published yet. See
      # rustsec/audit-check@858dc40 "Update to use Node 24 (#48)".
      - uses: rustsec/audit-check@858dc40f52ca2b8570b7a997c1c4e35c6fc9a432
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
