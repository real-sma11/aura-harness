name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  # ---------------------------------------------------------------------------
  # Format check
  # ---------------------------------------------------------------------------
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------------
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --workspace --all-features

  # ---------------------------------------------------------------------------
  # MSRV (Minimum Supported Rust Version) check — must match
  # `rust-version` in the workspace Cargo.toml.
  # ---------------------------------------------------------------------------
  msrv:
    name: cargo check (MSRV 1.80.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@1.80.0

      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-1.80.0

      - name: cargo check --workspace --locked (MSRV)
        run: cargo check --workspace --all-targets --locked

  # ---------------------------------------------------------------------------
  # License / dependency policy
  # ---------------------------------------------------------------------------
  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo deny check
        run: cargo deny check

  # ---------------------------------------------------------------------------
  # Security advisories.
  #
  # Phase 9 rationale (see deny.toml [advisories] block): we keep
  # `continue-on-error: true` so a day-one upstream advisory disclosure
  # does not break the workspace build; in exchange `cargo deny check`
  # enforces a 30-day patch window via the [advisories] config block.
  # Operators must clear new advisories within 30 days or they become a
  # `cargo deny check` failure (which IS hard-fail in this workflow).
  # ---------------------------------------------------------------------------
  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Phase 9: deliberate soft-fail. The hard-fail gate is `cargo deny
    # check`, which honours the 30-day advisory window in deny.toml.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Phase 9: unused-workspace-dependency check (`cargo machete`).
  #
  # Hard-fails when any workspace crate declares a dependency that is
  # never imported. Prevents accidental fan-out as the layered
  # architecture splits/recombines crates.
  # ---------------------------------------------------------------------------
  machete:
    name: cargo machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: cargo machete
        run: cargo machete
