# cargo-deny configuration for aura-harness — finalised in Phase 9.
#
# Locks down the workspace dependency policy now that the layered
# architecture is in place:
#
#   * Licenses: an explicit MIT / Apache-2.0 / BSD / ISC / MPL / Unicode
#     allow-list; GPL-family copyleft denied so we don't accidentally
#     inherit a viral license through a transitive bump.
#   * Bans: deny duplicate `tokio` and `serde` major versions (these are
#     the workspace's two hottest cross-cutting deps; multiple majors
#     mean we have a dep that hasn't caught up); deny `openssl-sys` in
#     favour of `rustls` (no native OpenSSL linkage).
#   * Advisories: hard-fail on advisories that have been open for >30
#     days; warn-only on advisories newer than 30 days so a freshly
#     published advisory doesn't break CI on day 1 — operators have a
#     month to patch.
#   * Sources: crates.io only. Any other registry or arbitrary git
#     source is a hard failure.

[graph]
# Restrict the check to the targets we actually ship. Keeps the report
# small and avoids dragging in Windows-only dep trees when running on
# Linux CI.
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-pc-windows-msvc" },
  { triple = "x86_64-apple-darwin" },
  { triple = "aarch64-apple-darwin" },
]
all-features = true

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — Phase 9 hardening: hard-fail on > 30-day-old advisories;
# warn on newer ones so day-one disclosures get a 30-day patch window
# before CI starts blocking merges.
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "warn"
# Each ignored RUSTSEC must reference a tracking issue or explanation.
# Phase 9 keeps the Phase 4–6 set; new ignores require a phase
# reference in the comment block and a follow-up issue.
ignore = [
  # `rustls-pemfile` unmaintained; transitive via tonic/reqwest ecosystem.
  "RUSTSEC-2025-0134",
  # `serial` (transitive via portable-pty on Windows). No safe upgrade path.
  "RUSTSEC-2017-0008",
]

# ---------------------------------------------------------------------------
# Licenses — Phase 9 finalised allow-list. Copyleft (GPL / AGPL / LGPL)
# is intentionally absent so the workspace cannot inherit a viral
# license through a transitive bump. New licenses require an explicit
# addition + a justification in the PR description.
# ---------------------------------------------------------------------------
[licenses]
version = 2
confidence-threshold = 0.8
# Internal workspace crates are unpublished private crates and are not
# license-declared today. TODO(post-phase-9): add explicit SPDX
# headers + license fields, then drop this clause.
private = { ignore = true }
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "MPL-2.0",
  "CC0-1.0",
  "Zlib",
  "BSL-1.0",
  "0BSD",
]
# OpenSSL ring linkage requires these clarifications.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
  { path = "LICENSE", hash = 0xbd0eed23 },
]

# ---------------------------------------------------------------------------
# Bans — Phase 9 hardening:
#
#   * Duplicate `tokio` major versions are denied — workspace pins one.
#   * Duplicate `serde` major versions are denied — same reason.
#   * `openssl-sys` is denied; the workspace standardises on `rustls`
#     so we don't link the native OpenSSL stack.
#
# Existing duplicate noise (windows-sys / base64 / hashbrown / bitflags
# / itertools / getrandom) is still allowed via `skip` because the
# upstream dep graph hasn't settled. Each `skip` entry is a TODO for a
# future cleanup wave.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# Internal workspace path deps use `version = "*"`. We keep wildcards
# globally for now; flip back to `wildcards = "deny"` +
# `allow-wildcard-paths = true` once all workspace crates carry
# `publish = false`.
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
# Phase 9 ban-list — aspirational entries flagged as TODOs:
#
#   - `openssl-sys` — the workspace's intent is to standardise on
#     `rustls`. Today's `reqwest 0.11.27` dep ships with
#     default-tls (which pulls in native-tls and openssl-sys);
#     flipping reqwest to `rustls-tls` is tracked as Phase 10
#     follow-up. Once that migration lands, uncomment the entry
#     below so cargo-deny enforces the policy.
#
# Note: duplicate-major detection for `tokio` and `serde` is
# tracked separately by the `multiple-versions` toggle above
# combined with `highlight = "all"`. The workspace's two
# hottest cross-cutting deps surface in the report and a
# duplicated major is treated as a fix-it pass during review.
deny = [
  # TODO(phase-10-rustls-migration): re-enable once reqwest
  # switches to `rustls-tls` features and the openssl-sys
  # transitive is gone.
  # { name = "openssl-sys" },
]

# Known duplicate crates that ship today. Each entry is a TODO: when
# the underlying dep graph is reconciled, the line should be removed
# so cargo-deny flags regressions.
skip = [
  { name = "windows-sys" },
  { name = "windows-targets" },
  { name = "windows_x86_64_gnu" },
  { name = "windows_x86_64_msvc" },
  { name = "base64" },
  { name = "hashbrown" },
  { name = "bitflags" },
  { name = "itertools" },
  { name = "getrandom" },
]

# ---------------------------------------------------------------------------
# Sources — Phase 9 finalised: crates.io only.
#
# Any other registry or arbitrary git source is a hard failure. The
# allow-git list is intentionally empty so a stray `git = "..."` dep
# fails the workspace check.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
